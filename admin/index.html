<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZENIX.LOL Admin</title>
  <meta name="description" content="Admin Zenix.lol" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css?v=20260314-c238" />
  <style>
    .admin-shell { width: min(880px, 92vw); margin: 40px auto; display: grid; gap: 20px; }
    .admin-grid { display: grid; gap: 20px; }
    .admin-card { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 18px; padding: 20px; box-shadow: var(--shadow); }
    .admin-card h2 { margin-bottom: 10px; font-size: 1.1rem; }
    .admin-row { display: grid; gap: 12px; }
    .admin-row label { font-size: 0.9rem; color: var(--muted); }
    .admin-row input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(10, 14, 22, 0.7); color: var(--text); }
    .admin-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    .admin-status { color: var(--muted); font-size: 0.9rem; margin-top: 10px; }
    .admin-links { display: grid; gap: 8px; }
    .admin-links .current { color: var(--text); font-weight: 600; }
    .admin-links .previous { color: rgba(226,232,240,0.55); text-decoration: line-through; }
  </style>
</head>
<body>
  <main class="admin-shell">
    <header class="hero">
      <p class="eyebrow">ZENIX.LOL</p>
      <h1>ADMIN BACKUP</h1>
      <p class="lead">Mets a jour le lien actif affiche sur zenix.lol.</p>
      <div class="admin-actions">
        <button class="btn" type="button" id="logoutBtn" hidden>Changer le mot de passe</button>
      </div>
    </header>

    <section class="admin-card" id="loginCard">
      <h2>Connexion</h2>
      <form id="loginForm" class="admin-row" onsubmit="return false;" action="javascript:void(0)">
        <div>
          <label for="adminPassword">Mot de passe admin zenix.lol</label>
          <input id="adminPassword" type="password" autocomplete="current-password" placeholder="Mot de passe" required />
        </div>
        <div class="admin-actions">
          <button class="btn" id="loginBtn" type="button">Acceder</button>
        </div>
        <p class="admin-status" id="loginStatus"></p>
      </form>
    </section>

    <section id="adminPanel" hidden>
      <div class="admin-grid">
        <section class="admin-card">
          <h2>Lien actuel</h2>
          <div class="admin-links">
            <span class="current" id="currentUrl">...</span>
            <span class="previous" id="previousUrl" hidden>...</span>
          </div>
          <p class="admin-status" id="lastUpdated">Chargement...</p>
        </section>

        <section class="admin-card">
          <h2>Mettre a jour l'URL</h2>
          <form id="backupForm" class="admin-row" onsubmit="return false;" action="javascript:void(0)">
            <div>
              <label for="newUrl">Nouvelle URL active</label>
              <input id="newUrl" type="url" placeholder="https://nouveau-domaine.xyz" required />
            </div>
            <div class="admin-actions">
              <button class="btn" id="updateBtn" type="button">Mettre a jour</button>
              <button class="btn" type="button" id="refreshBtn">Recharger</button>
            </div>
            <p class="admin-status" id="formStatus"></p>
          </form>
        </section>
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>ZENIX.LOL · Admin</span>
  </footer>

  <script src="admin.js?v=20260314-c238"></script>
  <script>
    (function () {
      if (window.__zenixLolAdminReady) return;
      const API_URL = "https://zenix.best/api/backup-config";
      const STORAGE_KEY = "zenix_lol_admin_pw";
      const refs = {
        loginCard: document.getElementById("loginCard"),
        panel: document.getElementById("adminPanel"),
        logoutBtn: document.getElementById("logoutBtn"),
        loginStatus: document.getElementById("loginStatus"),
        formStatus: document.getElementById("formStatus"),
        password: document.getElementById("adminPassword"),
        newUrl: document.getElementById("newUrl"),
        loginBtn: document.getElementById("loginBtn"),
        updateBtn: document.getElementById("updateBtn"),
        refreshBtn: document.getElementById("refreshBtn"),
        currentUrl: document.getElementById("currentUrl"),
        previousUrl: document.getElementById("previousUrl"),
        lastUpdated: document.getElementById("lastUpdated"),
      };

      function setAuthed(authed) {
        if (refs.loginCard) refs.loginCard.hidden = authed;
        if (refs.panel) refs.panel.hidden = !authed;
        if (refs.logoutBtn) refs.logoutBtn.hidden = !authed;
      }

      function setLoginStatus(text, isError) {
        if (!refs.loginStatus) return;
        refs.loginStatus.textContent = text || "";
        refs.loginStatus.style.color = isError ? "#fca5a5" : "#86efac";
      }

      function setFormStatus(text, isError) {
        if (!refs.formStatus) return;
        refs.formStatus.textContent = text || "";
        refs.formStatus.style.color = isError ? "#fca5a5" : "rgba(226, 232, 240, 0.7)";
      }

      function getStoredPassword() {
        return sessionStorage.getItem(STORAGE_KEY) || "";
      }

      function storePassword(value) {
        if (value) sessionStorage.setItem(STORAGE_KEY, value);
      }

      function clearStoredPassword() {
        sessionStorage.removeItem(STORAGE_KEY);
      }

      function renderData(data) {
        if (!data) return;
        const current = String(data.currentUrl || "").trim();
        const previous = String(data.previousUrl || "").trim();
        const updatedAt = Number(data.updatedAt || 0);
        if (refs.currentUrl) refs.currentUrl.textContent = current || "-";
        if (refs.previousUrl) {
          const show = previous && previous !== current;
          refs.previousUrl.hidden = !show;
          if (show) refs.previousUrl.textContent = previous;
        }
        if (refs.lastUpdated) {
          if (updatedAt) {
            refs.lastUpdated.textContent =
              "Mis a jour · " +
              new Date(updatedAt).toLocaleString("fr-FR", { dateStyle: "medium", timeStyle: "short" });
          } else {
            refs.lastUpdated.textContent = "Mis a jour";
          }
        }
      }

      async function loadConfig() {
        try {
          const res = await fetch(API_URL, { cache: "no-store" });
          if (!res.ok) throw new Error("fetch failed");
          const payload = await res.json();
          renderData(payload.data || null);
        } catch {
          if (refs.lastUpdated) refs.lastUpdated.textContent = "Impossible de charger";
        }
      }

      async function verifyPassword(password) {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password, url: "" }),
        });
        if (res.status === 401) return { ok: false, reason: "bad" };
        if (res.status === 429) return { ok: false, reason: "rate" };
        if (!res.ok && res.status !== 400) return { ok: false, reason: "error" };
        return { ok: true };
      }

      async function handleLogin() {
        const password = String(refs.password?.value || "").trim();
        if (!password) {
          setLoginStatus("Mot de passe requis.", true);
          return;
        }
        setLoginStatus("Verification...");
        try {
          const result = await verifyPassword(password);
          if (!result.ok) {
            if (result.reason === "rate") {
              setLoginStatus("Trop de tentatives. Reessaie plus tard.", true);
            } else if (result.reason === "bad") {
              clearStoredPassword();
              setLoginStatus("Mot de passe incorrect.", true);
            } else {
              setLoginStatus("Erreur de verification.", true);
            }
            return;
          }
          storePassword(password);
          if (refs.password) refs.password.value = "";
          setLoginStatus("Mot de passe correct.");
          setAuthed(true);
          loadConfig();
        } catch {
          setLoginStatus("Erreur reseau.", true);
        }
      }

      async function handleUpdate() {
        const password = String(getStoredPassword() || "").trim();
        const url = String(refs.newUrl?.value || "").trim();
        if (!password) {
          setAuthed(false);
          setFormStatus("Mot de passe requis.", true);
          return;
        }
        if (!url) {
          setFormStatus("URL obligatoire.", true);
          return;
        }
        setFormStatus("Mise a jour en cours...");
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password, url }),
          });
          const payload = await res.json().catch(() => ({}));
          if (!res.ok || !payload?.ok) {
            if (res.status === 401) {
              clearStoredPassword();
              setAuthed(false);
              setLoginStatus("Mot de passe incorrect.", true);
            }
            setFormStatus(payload?.error || "Mise a jour impossible", true);
            return;
          }
          renderData(payload.data || null);
          setFormStatus("Lien mis a jour.");
          if (refs.newUrl) refs.newUrl.value = "";
        } catch {
          setFormStatus("Erreur reseau.", true);
        }
      }

      if (refs.loginBtn) refs.loginBtn.addEventListener("click", handleLogin);
      if (refs.updateBtn) refs.updateBtn.addEventListener("click", handleUpdate);
      if (refs.refreshBtn) refs.refreshBtn.addEventListener("click", loadConfig);
      if (refs.password) {
        refs.password.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            handleLogin();
          }
        });
      }
      if (refs.newUrl) {
        refs.newUrl.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            handleUpdate();
          }
        });
      }
      if (refs.logoutBtn) {
        refs.logoutBtn.addEventListener("click", () => {
          clearStoredPassword();
          setAuthed(false);
        });
      }

      if (getStoredPassword()) {
        setAuthed(true);
        loadConfig();
      } else {
        setAuthed(false);
      }
    })();
  </script>
</body>
</html>
